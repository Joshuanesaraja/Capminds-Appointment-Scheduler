<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Capminds Appointment Scheduler</title>
    <!-- icon -->
    <link rel="icon" href="../images/icons/appointment.png">
    <!-- google font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- for icons font awesome is used -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/calendar.css" />
    <link rel="stylesheet" href="../css/modal.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="logo">
          <img src="../images/logo.png" alt="Logo"/>
        </div>

        <div class="menu">
          <a class="active">
            <span><i class="fa-regular fa-calendar"></i></span>
            <span>Calendar</span>
          </a>

          <a href="dashboard.html">
            <span><i class="fa-solid fa-grip"></i></span>
            <span>Dashboard</span>
          </a>
        </div>
      </aside>

      <main class="main">
        <header class="header">
          <button id="bookBtn"><i class="fa-solid fa-plus"></i> Book Appointment</button>
        </header>

        <section class="calendar-wrapper">
          <div class="calendar-toolbar">
            <div class="calendar-nav">
              <button id="prevBtn"><i class="fa-solid fa-less-than"></i></button>

              <h2 id="monthYear"></h2>

              <button id="nextBtn"><i class="fa-solid fa-greater-than"></i></button>

              <button id="todayBtn">Today</button>
            </div>
          </div>

          <div id="calendar"></div>
        </section>
      </main>
    </div>

    <div id="calendar"></div>

    <div class="modal" id="appointmentModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Schedule Appointment</h3>

          <button class="close-btn" id="closeModal"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <form id="appointmentForm">
          <div class="modal-body">
            <div class="form-grid">
              <div class="form-group">
                <label>Patient Name</label>
                <input type="text" id="patientName" />
              </div>

              <div class="form-group">
                <label>Doctor Name</label>
                <input type="text" id="doctorName" />
              </div>

              <div class="form-group">
                <label>Hospital Name</label>
                <input type="text" id="hospitalName" />
              </div>

              <div class="form-group">
                <label>Specialty</label>
                <input type="text" id="specialty" />
              </div>

              <div class="form-group">
                <label>Date</label>
                <input type="date" id="appointmentDate" />
              </div>

              <div class="form-group">
                <label>Time</label>
                <input type="time" id="appointmentTime" />
              </div>

              <div class="form-group full">
                <label>Reason</label>
                <textarea id="reason"></textarea>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="cancel-btn" id="cancelBtn">
              Cancel
            </button>

            <button type="submit" class="save-btn">Save</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/calendar.js"></script>
    <script src="../js/modal.js"></script>
    <script src="../js/app.js"></script>
  </body>
</html>
